spring.application.name=notes

# Load local development values from the project-root .env file when present.
# The file is optional so shared environments can provide configuration externally.
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${NOTES_DATABASE_URL:jdbc:postgresql://localhost:5432/notes_dev}
spring.datasource.username=${NOTES_DATABASE_USERNAME:notes_dev}
spring.datasource.password=${NOTES_DATABASE_PASSWORD:notes_dev_password}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

notes.entra.tenant-id=${NOTES_ENTRA_TENANT_ID}
notes.entra.api-client-id=${NOTES_ENTRA_API_CLIENT_ID}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${NOTES_ENTRA_TENANT_ID}/v2.0

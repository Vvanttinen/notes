services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${NOTES_DATABASE_NAME:-notes_dev}
      POSTGRES_USER: ${NOTES_DATABASE_USERNAME:-notes_dev}
      POSTGRES_PASSWORD: ${NOTES_DATABASE_PASSWORD:-notes_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
